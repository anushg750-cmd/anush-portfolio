name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g htmlhint
      - run: htmlhint index.html || true
      - run: test -f index.html && test -f style.css && test -f script.js

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
        working-directory: backend
      - run: node --check server.js
        working-directory: backend

  deploy-frontend:
    name: Deploy to GitHub Pages
    needs: [lint-frontend, test-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
```

Then in terminal:
```
git add .
git commit -m "Fix YAML syntax error"
git push