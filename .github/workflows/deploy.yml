name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
jobs:
  check-files:
    name: Check Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f index.html && echo "OK"
      - run: test -f style.css && echo "OK"
      - run: test -f script.js && echo "OK"
  deploy:
    name: Deploy to GitHub Pages
    needs: check-files
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
