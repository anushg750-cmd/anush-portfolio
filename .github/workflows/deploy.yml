# .github/workflows/deploy.yml
# This runs automatically every time you push to GitHub

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ===== JOB 1: Lint and Test Frontend =====
  lint-frontend:
    name: Lint Frontend HTML/CSS/JS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint (HTML linter)
        run: npm install -g htmlhint

      - name: Lint HTML
        run: htmlhint index.html

      - name: Check files exist
        run: |
          echo "[+] Checking required files..."
          test -f index.html && echo "✅ index.html found"
          test -f style.css  && echo "✅ style.css found"
          test -f script.js  && echo "✅ script.js found"
          echo "[+] All frontend files present!"

  # ===== JOB 2: Test Backend =====
  test-backend:
    name: Test Node.js Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Check server.js syntax
        run: node --check server.js && echo "✅ server.js syntax OK"

  # ===== JOB 3: Deploy to GitHub Pages =====
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    needs: [lint-frontend, test-backend]   # Only runs if both jobs above pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'    # Only deploy on main branch push
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./          # Deploy root folder (where index.html is)
          exclude_assets: 'backend/**,*.md,.github/**'
