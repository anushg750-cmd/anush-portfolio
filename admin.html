<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel | Anush G Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050a0e;
      --bg2: #0a1118;
      --bg3: #0d1922;
      --green: #00ff88;
      --cyan: #00e5ff;
      --red: #ff3366;
      --yellow: #ffcc00;
      --text: #c8d8e8;
      --text-dim: #6a8a9a;
      --border: #1a3040;
      --card-bg: #0b1520;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Orbitron', sans-serif;
      --font-body: 'Rajdhani', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
    }

    /* ===== LOGIN PAGE ===== */
    #loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,255,136,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0,229,255,0.03) 0%, transparent 60%),
        var(--bg);
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      background: var(--bg2);
      border: 1px solid var(--green);
      box-shadow: 0 0 60px rgba(0,255,136,0.12);
      overflow: hidden;
    }

    .login-top {
      background: #0a1a10;
      border-bottom: 1px solid var(--green);
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .login-top-dots span {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #febc2e; }
    .dot-g { background: #28c840; }

    .login-top-title {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-left: 0.5rem;
    }

    .login-body {
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .shield-icon {
      font-size: 3.5rem;
      filter: drop-shadow(0 0 20px rgba(0,255,136,0.4));
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 4px;
      color: var(--green);
      text-align: center;
    }

    .login-sub {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: -1rem;
    }

    .login-fields {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .field-group label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--cyan);
      letter-spacing: 2px;
    }

    .field-group input {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1rem;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field-group input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(0,255,136,0.1);
    }

    .login-error {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--red);
      padding: 0.6rem 1rem;
      border: 1px solid var(--red);
      background: rgba(255,51,102,0.05);
      text-align: center;
      width: 100%;
      display: none;
    }

    .login-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: var(--font-display);
      font-size: 0.85rem;
      letter-spacing: 3px;
      padding: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .login-btn:hover {
      background: var(--green);
      color: var(--bg);
      box-shadow: 0 0 30px rgba(0,255,136,0.3);
    }

    .back-link {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-dim);
      text-decoration: none;
      text-align: center;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--green); }

    /* ===== DASHBOARD ===== */
    #dashboardPage { display: none; min-height: 100vh; flex-direction: column; }

    .dash-nav {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .dash-nav-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .dash-logo {
      font-family: var(--font-display);
      font-size: 0.9rem;
      letter-spacing: 2px;
      color: var(--green);
    }

    .dash-badge {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 0.2rem 0.6rem;
      background: rgba(0,255,136,0.1);
      border: 1px solid var(--green);
      color: var(--green);
      letter-spacing: 1px;
    }

    .dash-nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .dash-user {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .logout-btn:hover { background: rgba(255,51,102,0.1); }

    .dash-content {
      flex: 1;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem;
    }

    .dash-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 1.2rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .stat-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(to right, var(--green), transparent);
    }

    .stat-box-num {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--green);
    }

    .stat-box-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-top: 0.3rem;
    }

    .inbox-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
    }

    .inbox-title {
      font-family: var(--font-display);
      font-size: 0.85rem;
      letter-spacing: 3px;
      color: var(--cyan);
    }

    .clear-all-btn {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .clear-all-btn:hover { background: rgba(255,51,102,0.1); }

    .messages-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      padding: 1.2rem 1.5rem;
      transition: border-color 0.2s;
    }

    .msg-card:hover { border-color: var(--green); box-shadow: 0 4px 20px rgba(0,255,136,0.07); }

    .msg-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.6rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .msg-sender {
      font-family: var(--font-display);
      font-size: 0.85rem;
      color: var(--green);
      letter-spacing: 1px;
    }

    .msg-time {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-dim);
    }

    .msg-email {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--cyan);
      margin-bottom: 0.3rem;
    }

    .msg-subject {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--yellow);
      margin-bottom: 0.8rem;
    }

    .msg-body {
      font-size: 0.95rem;
      color: var(--text-dim);
      line-height: 1.7;
      border-top: 1px solid var(--border);
      padding-top: 0.8rem;
    }

    .msg-delete {
      float: right;
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.2rem 0.4rem;
      transition: color 0.2s;
    }
    .msg-delete:hover { color: var(--red); }

    .empty-inbox {
      text-align: center;
      padding: 4rem 2rem;
      font-family: var(--font-mono);
      color: var(--text-dim);
    }

    .empty-inbox .empty-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    .empty-inbox p { font-size: 0.85rem; line-height: 2; }
    .empty-inbox a { color: var(--green); text-decoration: none; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
    ::-webkit-scrollbar-thumb:hover { background: var(--green); }

    @media (max-width: 600px) {
      .dash-stats { grid-template-columns: 1fr 1fr; }
      .dash-content { padding: 1rem; }
    }
  </style>
</head>
<body>

  <!-- ===== LOGIN PAGE ===== -->
  <div id="loginPage">
    <div class="login-box">
      <div class="login-top">
        <div class="login-top-dots">
          <span class="dot-r"></span>
          <span class="dot-y"></span>
          <span class="dot-g"></span>
        </div>
        <span class="login-top-title">admin@anush-portfolio:~$</span>
      </div>
      <div class="login-body">
        <div class="shield-icon">🛡️</div>
        <div class="login-title">ADMIN ACCESS</div>
        <p class="login-sub">Authorised personnel only</p>
        <div class="login-fields">
          <div class="field-group">
            <label>USERNAME</label>
            <input type="text" id="loginUser" placeholder="Enter username" autocomplete="off"/>
          </div>
          <div class="field-group">
            <label>PASSWORD</label>
            <input type="password" id="loginPass" placeholder="Enter password"/>
          </div>
          <div id="loginError" class="login-error">❌ Invalid credentials. Access denied.</div>
          <button class="login-btn" onclick="doLogin()">ACCESS PANEL →</button>
        </div>
        <a href="index.html" class="back-link">← Back to portfolio</a>
      </div>
    </div>
  </div>

  <!-- ===== DASHBOARD ===== -->
  <div id="dashboardPage">
    <nav class="dash-nav">
      <div class="dash-nav-left">
        <span class="dash-logo">⚡ ADMIN PANEL</span>
        <span class="dash-badge">SECURE</span>
      </div>
      <div class="dash-nav-right">
        <span class="dash-user">👤 admin</span>
        <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
      </div>
    </nav>

    <div class="dash-content">
      <!-- Stats -->
      <div class="dash-stats">
        <div class="stat-box">
          <div class="stat-box-num" id="totalCount">0</div>
          <div class="stat-box-label">TOTAL MESSAGES</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-num" id="todayCount">0</div>
          <div class="stat-box-label">TODAY</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-num" id="lastDate">—</div>
          <div class="stat-box-label">LAST MESSAGE</div>
        </div>
      </div>

      <!-- Inbox -->
      <div class="inbox-header">
        <span class="inbox-title">📨 INBOX</span>
        <button class="clear-all-btn" onclick="clearAll()">🗑 Clear All</button>
      </div>
      <div class="messages-list" id="messagesList"></div>
    </div>
  </div>

  <script>
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "adminanush";

    // Allow Enter key on password field
    document.getElementById("loginPass").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });

    function doLogin() {
      const u = document.getElementById("loginUser").value.trim();
      const p = document.getElementById("loginPass").value;
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboardPage").style.display = "flex";
        loadDashboard();
      } else {
        document.getElementById("loginError").style.display = "block";
        document.getElementById("loginPass").value = "";
      }
    }

    function doLogout() {
      document.getElementById("dashboardPage").style.display = "none";
      document.getElementById("loginPage").style.display = "flex";
      document.getElementById("loginUser").value = "";
      document.getElementById("loginPass").value = "";
      document.getElementById("loginError").style.display = "none";
    }

    function loadDashboard() {
      const msgs = JSON.parse(localStorage.getItem("portfolio_messages") || "[]");

      // Stats
      document.getElementById("totalCount").textContent = msgs.length;

      const today = new Date().toLocaleDateString();
      const todayMsgs = msgs.filter(m => new Date(m.id).toLocaleDateString() === today);
      document.getElementById("todayCount").textContent = todayMsgs.length;

      if (msgs.length > 0) {
        const last = new Date(msgs[0].id);
        document.getElementById("lastDate").textContent =
          last.toLocaleDateString("en-IN", { day: "numeric", month: "short" });
      }

      // Messages
      const list = document.getElementById("messagesList");
      if (msgs.length === 0) {
        list.innerHTML = `
          <div class="empty-inbox">
            <span class="empty-icon">📭</span>
            <p>No messages yet.<br>
            Share your portfolio at<br>
            <a href="https://anushg750-cmd.github.io/anush-portfolio" target="_blank">anushg750-cmd.github.io/anush-portfolio</a></p>
          </div>`;
        return;
      }

      list.innerHTML = msgs.map((m, i) => `
        <div class="msg-card" id="msg-${m.id}">
          <div class="msg-card-top">
            <span class="msg-sender">${esc(m.name)}</span>
            <div>
              <span class="msg-time">${m.time}</span>
              <button class="msg-delete" onclick="deleteMsg(${m.id})" title="Delete">🗑</button>
            </div>
          </div>
          <div class="msg-email">📧 ${esc(m.email)}</div>
          <div class="msg-subject">📌 ${esc(m.subject)}</div>
          <div class="msg-body">${esc(m.message)}</div>
        </div>
      `).join("");
    }

    function deleteMsg(id) {
      let msgs = JSON.parse(localStorage.getItem("portfolio_messages") || "[]");
      msgs = msgs.filter(m => m.id !== id);
      localStorage.setItem("portfolio_messages", JSON.stringify(msgs));
      loadDashboard();
    }

    function clearAll() {
      if (confirm("Delete ALL messages? This cannot be undone.")) {
        localStorage.removeItem("portfolio_messages");
        loadDashboard();
      }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
